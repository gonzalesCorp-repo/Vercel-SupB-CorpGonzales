<div class="h-full flex flex-col gap-4 pr-2">
    
    <!-- Constructor Principal Único -->
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-bold mb-4 text-gray-800">Nueva OATC</h2>
        
        <!-- Fila 1: Cliente y Catálogo -->
        <div class="flex flex-col lg:flex-row gap-4 mb-4">
            
            <!-- Cliente -->
            <div class="flex-1">
                <label class="block text-xs font-semibold text-gray-700 mb-1">Cliente</label>
                <div class="relative w-full" x-data="{ open: false }">
                    <input type="text" 
                           x-model="oatcForm.cliente_nombre" 
                           @input="buscarClienteDebounced(); open = true" 
                           @focus="open = true"
                           @click.away="open = false"
                           placeholder="Buscar por nombre, DNI o número" 
                           class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 pr-8 focus:ring-primary-500 focus:border-primary-500 transition-colors">
                    
                    <div class="absolute inset-y-0 right-0 flex items-center pr-2.5 pointer-events-none">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>

                    <div x-show="open && clientesSugeridos.length > 0" 
                         x-transition.opacity
                         class="absolute z-30 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-xl max-h-48 overflow-y-auto">
                        <template x-for="cli in clientesSugeridos">
                            <div @click="seleccionarCliente(cli); open = false" class="p-3 hover:bg-primary-50 cursor-pointer border-b border-gray-50 last:border-0 transition-colors">
                                <span class="font-semibold text-gray-800 text-sm" x-text="cli.nombre"></span> 
                                <span class="text-gray-500 text-xs ml-1" x-text="(cli.dni ? 'DNI: '+cli.dni : '') + (cli.celular ? ' - Cel: '+cli.celular : '')"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Botones Catálogo Modal -->
            <div class="w-auto flex flex-col justify-end shrink-0">
                <label class="block text-xs font-semibold text-gray-700 mb-1">Catálogo</label>
                <div class="flex gap-2 h-[42px]">
                    <button @click="abrirModalCatalogo('servicio')" class="w-12 flex items-center justify-center bg-blue-50 text-blue-700 text-xl border border-blue-200 rounded-lg hover:bg-blue-600 hover:text-white hover:border-blue-600 transition-all shadow-sm" title="Agregar Servicio">
                        ✂️
                    </button>
                    <button @click="abrirModalCatalogo('producto')" class="w-12 flex items-center justify-center bg-green-50 text-green-700 text-xl border border-green-200 rounded-lg hover:bg-green-600 hover:text-white hover:border-green-600 transition-all shadow-sm" title="Agregar Producto Retail">
                        🧴
                    </button>
                </div>
            </div>
        </div>

        <!-- Punto de Partida -->
        <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Punto de Partida (Seleccionados)</label>
            <div class="bg-gray-50 min-h-[60px] border border-gray-200 rounded p-2">
                <template x-if="oatcForm.punto_partida.length === 0">
                    <div class="text-xs text-gray-400 text-center mt-2">Busca en el catálogo y agrégalos aquí ➔</div>
                </template>
                <ul class="space-y-1">
                    <template x-for="(item, index) in oatcForm.punto_partida">
                        <li class="flex justify-between items-center text-xs bg-white p-1.5 border rounded shadow-sm">
                            <span class="font-semibold text-gray-800 truncate pl-1" x-text="item.nombre"></span>
                            <button @click="oatcForm.punto_partida.splice(index, 1)" class="text-red-500 hover:text-red-700 hover:bg-red-50 rounded ml-2 font-bold px-2 py-0.5 transition-colors">X</button>
                        </li>
                    </template>
                </ul>
            </div>
        </div>

        <!-- Asignar Agente -->
        <div class="mb-5">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Asignar a Agente</label>
            <div class="relative">
                <select x-model="oatcForm.agente_id" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2.5 appearance-none focus:ring-primary-500 focus:border-primary-500 transition-colors">
                    <option value="">A Lista de Espera General</option>
                    <template x-for="ag in colaAgentes" :key="ag.id">
                        <option :value="ag.id" x-text="ag.nombre + ' (' + ag.estado + ')'" :disabled="ag.estado !== 'DISPONIBLE'"></option>
                    </template>
                </select>
                <div class="absolute inset-y-0 right-0 flex items-center pr-2.5 pointer-events-none">
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <!-- Botón Generar -->
        <button @click="crearOatcUI" class="w-full text-white bg-primary-600 hover:bg-primary-700 font-bold rounded-lg text-sm px-4 py-3 shadow-md hover:shadow-lg transition-all" :disabled="!oatcForm.cliente_nombre || oatcForm.punto_partida.length === 0 || isLoadingOatc">
            <span x-text="isLoadingOatc ? 'Procesando...' : 'Generar OATC'"></span>
        </button>
        <p x-show="msgOatc" class="mt-2 text-xs text-center text-green-600 font-medium" x-text="msgOatc"></p>
    </div>

    <!-- ABAJO: Órdenes en Curso / Espera -->
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 shadow-sm mt-2 mb-4">
        <h3 class="text-md font-bold text-yellow-800 mb-3">Listado de Atención (Hoy)</h3>
        <div class="flex flex-col gap-2 max-h-[300px] overflow-y-auto">
            <template x-for="oatc in oatcsEnEspera" :key="oatc.id">
                <div class="bg-white border border-yellow-300 rounded p-3 shadow-sm flex items-center justify-between">
                    <div>
                        <span class="font-bold text-gray-800 text-sm" x-text="oatc.cliente_nombre"></span>
                        <div class="mt-1 flex items-center gap-2">
                            <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-yellow-100 text-yellow-800" x-text="oatc.estado_proceso"></span>
                            <span class="text-xs text-gray-500" x-text="oatc.agente_nombre || 'POR ASIGNAR'"></span>
                        </div>
                    </div>
                    <button class="text-xs font-medium text-white bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded transition shadow-sm">Terminar</button>
                </div>
            </template>
            <template x-if="oatcsEnEspera.length === 0">
                <div class="text-sm text-gray-500 italic text-center py-6 bg-white/50 rounded-lg border border-dashed border-gray-300">No hay órdenes pendientes.</div>
            </template>
        </div>
    </div>

</div>
