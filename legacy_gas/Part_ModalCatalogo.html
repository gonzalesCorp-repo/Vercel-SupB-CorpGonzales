<div x-show="modalCatalogoAbierto !== null" class="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-50" x-transition.opacity>
    <div class="bg-white rounded-xl shadow-2xl w-11/12 max-w-5xl max-h-[90vh] flex flex-col overflow-hidden" @click.away="modalCatalogoAbierto = null">
        
        <!-- Header -->
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-white">
            <div class="flex items-center gap-3">
                <div class="p-2 rounded-lg text-2xl flex items-center justify-center w-12 h-12" :class="modalCatalogoAbierto === 'servicio' ? 'bg-blue-100 text-blue-600' : 'bg-green-100 text-green-600'">
                    <!-- Icono Tijeras para Servicio -->
                    <span x-show="modalCatalogoAbierto === 'servicio'">✂️</span>

                    <!-- Icono Botella (Shampoo) para Retail -->
                    <span x-show="modalCatalogoAbierto === 'producto'">🧴</span>
                </div>
                <h2 class="text-xl font-bold text-gray-800" x-text="modalCatalogoAbierto === 'servicio' ? 'Catálogo de Servicios' : 'Catálogo de Productos (Retail)'"></h2>
            </div>
            <button @click="modalCatalogoAbierto = null" class="text-gray-400 hover:text-red-500 transition-colors p-1 rounded-full hover:bg-red-50">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <!-- Search and Filters -->
        <div class="px-6 py-4 border-b border-gray-100 flex flex-col gap-4 bg-gray-50/50">
            <div class="relative">
                <input type="text" x-model="modalCatalogoQuery" class="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded-xl p-3 pl-10 shadow-sm focus:ring-primary-500 focus:border-primary-500 transition-colors" placeholder="Buscar por nombre, categoría o marca...">
                <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
            
            <!-- Category Tabs -->
            <div class="flex overflow-x-auto pb-1 gap-2 snap-x scrollbar-hide">
                <button @click="modalCategoriaSeleccionada = 'todas'" class="px-5 py-2 text-xs font-bold rounded-full whitespace-nowrap snap-start transition-colors border shadow-sm" :class="modalCategoriaSeleccionada === 'todas' ? 'bg-gray-800 text-white border-gray-800' : 'bg-white text-gray-600 hover:bg-gray-50 border-gray-200'">Todas</button>
                <template x-for="cat in categoriasCatalogoModal" :key="cat">
                    <button @click="modalCategoriaSeleccionada = cat" class="px-5 py-2 text-xs font-semibold rounded-full whitespace-nowrap snap-start transition-colors border shadow-sm capitalize" :class="modalCategoriaSeleccionada === cat ? (modalCatalogoAbierto === 'servicio' ? 'bg-blue-600 text-white border-blue-600' : 'bg-green-600 text-white border-green-600') : 'bg-white text-gray-600 hover:bg-gray-50 border-gray-200'" x-text="cat"></button>
                </template>
            </div>
        </div>

        <!-- List -->
        <div class="flex-1 overflow-y-auto p-6 bg-gray-50/50">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <template x-for="bien in bienesModalFiltrados" :key="bien.bien_id || Math.random()">
                    <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm hover:shadow-md hover:border-gray-300 transition-all flex flex-col justify-between h-full group">
                        <div>
                            <div class="flex justify-between items-start mb-3 gap-2">
                                <span class="text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wider line-clamp-1" :class="modalCatalogoAbierto === 'servicio' ? 'bg-blue-50 text-blue-700' : 'bg-green-50 text-green-700'" x-text="bien.categoria"></span>
                                <span class="text-sm font-black text-gray-900 shrink-0" x-show="bien.precio_venta" x-text="'S/ ' + bien.precio_venta"></span>
                            </div>
                            <h3 class="font-bold text-gray-800 text-[15px] mb-2 leading-snug line-clamp-2" x-text="bien.nombre"></h3>
                            
                            <!-- Atributos dinámicos -->
                            <div class="text-[11px] text-gray-500 mt-3 space-y-1.5 bg-gray-50 p-2 rounded-lg">
                                <template x-if="modalCatalogoAbierto === 'producto' && bien.atributos_producto_obj">
                                    <div class="flex flex-col gap-1">
                                        <p x-show="bien.atributos_producto_obj.marca" class="flex items-center gap-1"><span class="font-bold text-gray-600">Marca:</span> <span class="truncate" x-text="bien.atributos_producto_obj.marca"></span></p>
                                        <p x-show="bien.atributos_producto_obj.linea" class="flex items-center gap-1"><span class="font-bold text-gray-600">Línea:</span> <span class="truncate" x-text="bien.atributos_producto_obj.linea"></span></p>
                                    </div>
                                </template>
                                <template x-if="modalCatalogoAbierto === 'servicio' && bien.atributos_servicio_obj">
                                    <div class="flex flex-col gap-1">
                                        <p x-show="bien.atributos_servicio_obj.tiempo_estimado_min" class="flex items-center gap-1">
                                            <svg class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                            <span x-text="bien.atributos_servicio_obj.tiempo_estimado_min + ' min'"></span>
                                        </p>
                                    </div>
                                </template>
                                <template x-if="(!bien.atributos_producto_obj && modalCatalogoAbierto === 'producto') || (!bien.atributos_servicio_obj && modalCatalogoAbierto === 'servicio')">
                                    <p class="italic text-gray-400">Sin atributos adicionales</p>
                                </template>
                            </div>
                        </div>
                        <button @click="agregarAlPuntoPartida(bien)" class="mt-4 w-full font-bold rounded-xl text-xs px-4 py-2.5 transition-all flex items-center justify-center gap-2 border" :class="modalCatalogoAbierto === 'servicio' ? 'text-blue-600 bg-blue-50 border-blue-100 hover:bg-blue-600 hover:text-white hover:border-blue-600' : 'text-green-600 bg-green-50 border-green-100 hover:bg-green-600 hover:text-white hover:border-green-600'">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            Agregar al Ticket
                        </button>
                    </div>
                </template>
                <template x-if="bienesModalFiltrados.length === 0">
                    <div class="col-span-full py-16 flex flex-col items-center justify-center text-center">
                        <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                            <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-1">Sin resultados</h3>
                        <p class="text-sm text-gray-500 max-w-sm">No encontramos ningún ítem que coincida con tu búsqueda. Intenta con otros términos o selecciona "Todas".</p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>
